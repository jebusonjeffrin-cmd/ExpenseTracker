<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.com" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker - Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-color: #f4fcf4;
      --card-bg: #ffffff;
      --primary: #22c55e;
      --primary-hover: #16a34a;
      --text-dark: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --success-light: #dcfce7;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      margin: 0;
      padding-top: 80px;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 0.8rem 2rem;
    }

    .navbar-brand {
      font-weight: 800;
      color: var(--primary) !important;
      font-size: 1.5rem;
    }

    .nav-link {
      color: var(--text-muted) !important;
      font-weight: 600;
      transition: all 0.3s ease;
      margin: 0 0.5rem;
      border-radius: 8px;
      padding: 0.5rem 1rem !important;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--primary) !important;
      background: var(--success-light);
    }

    .logout-btn {
      background: #fee2e2;
      color: #ef4444;
      border: 1px solid #fecaca;
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      margin-left: 1rem;
    }

    .logout-btn:hover {
      background: #ef4444;
      color: white;
      text-decoration: none;
    }

    .main-container {
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card-custom {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      padding: 2rem;
    }

    .header-title {
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 2rem;
    }

    .btn-filter {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.5rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-filter:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .form-control {
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem rgba(34, 197, 94, 0.25);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">ExpenseTracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
        <i class="fa-solid fa-bars text-dark"></i>
      </button>
      <div class="collapse navbar-collapse" id="navContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/dashboard"><i class="fa-solid fa-house me-2"></i>Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/available_expenses"><i class="fa-solid fa-wallet me-2"></i>Expenses</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/new_expense"><i class="fa-solid fa-plus-circle me-2"></i>Add Expense</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/getchart"><i class="fa-solid fa-chart-pie me-2"></i>Report</a>
          </li>
        </ul>
        <div class="d-flex align-items-center">
          <span class="me-4 fw-bold text-dark" th:if="${message != null}">
            <i class="fa-solid fa-user-circle me-2 text-primary"></i> <span th:text="${message}">User</span>
          </span>
          <a th:href="@{/logout}" class="logout-btn"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="card-custom">
      <h2 class="header-title">Expense Report</h2>

      <form action="/chart" method="GET" class="row g-3 align-items-end mb-5">
        <div class="col-md-4">
          <label for="year" class="form-label fw-bold text-muted">Enter Year</label>
          <input type="text" id="year" name="year" class="form-control" placeholder="e.g. 2024" required>
        </div>
        <div class="col-md-4">
          <button type="submit" class="btn-filter"><i class="fa-solid fa-filter me-2"></i>Generate Chart</button>
        </div>
      </form>

      <div class="chart-container" style="position: relative; height:400px; width:100%">
        <canvas id="expenseChart" th:if="${monthlyTotals != null}"></canvas>
        <div th:if="${monthlyTotals == null}" class="text-center text-muted mt-5">
          <i class="fa-solid fa-chart-bar fs-1 mb-3" style="color: var(--border);"></i>
          <h5>Enter a year above to generate your expense report.</h5>
        </div>
      </div>
    </div>
  </div>

  <script th:if="${monthlyTotals != null}" th:inline="javascript">
    const monthlyTotals = /*[[${monthlyTotals}]]*/[];
    const months = Object.keys(monthlyTotals);
    const amounts = Object.values(monthlyTotals);
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    const monthLabels = months.map(month => monthNames[month - 1]);

    const ctx = document.getElementById('expenseChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [{
          label: 'Total Amount Spent',
          data: amounts,
          backgroundColor: 'rgba(34, 197, 94, 0.6)',
          borderColor: '#16a34a',
          borderWidth: 2,
          borderRadius: 5,
          hoverBackgroundColor: 'rgba(34, 197, 94, 0.8)'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            beginAtZero: true,
            grid: { borderDash: [2, 4], color: '#e5e7eb' }
          },
          x: {
            grid: { display: false }
          }
        },
        plugins: {
          legend: {
            labels: {
              font: { family: "'Inter', sans-serif", weight: '600' }
            }
          }
        }
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>

</html>
