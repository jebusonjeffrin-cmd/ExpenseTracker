<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Expense Tracker - Login</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
		crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
	<style>
		:root {
			--bg-color: #f4fcf4;
			--card-bg: #ffffff;
			--primary: #22c55e;
			--primary-hover: #16a34a;
			--text-dark: #1f2937;
			--text-muted: #6b7280;
			--border: #e5e7eb;
		}

		body {
			font-family: 'Inter', sans-serif;
			background-color: var(--bg-color);
			color: var(--text-dark);
			margin: 0;
			padding-top: 80px;
		}

		.navbar {
			background: rgba(255, 255, 255, 0.95) !important;
			backdrop-filter: blur(10px);
			border-bottom: 1px solid var(--border);
			box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
			padding: 0.8rem 2rem;
		}

		.navbar-brand {
			font-weight: 800;
			color: var(--primary) !important;
			font-size: 1.5rem;
		}

		.nav-link {
			color: var(--text-muted) !important;
			font-weight: 600;
			transition: all 0.3s ease;
			margin: 0 0.5rem;
			border-radius: 8px;
			padding: 0.5rem 1rem !important;
		}

		.nav-link:hover,
		.nav-link.active {
			color: var(--primary) !important;
			background: #dcfce7;
		}

		.auth-card {
			background: var(--card-bg);
			border-radius: 20px;
			border: 1px solid var(--border);
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
			padding: 3rem;
			margin-top: 2rem;
		}

		.auth-card h1 {
			font-weight: 800;
			color: var(--primary);
			margin-bottom: 2rem;
			text-align: center;
		}

		.form-control {
			border-radius: 10px;
			padding: 0.75rem 1rem;
			border: 1px solid var(--border);
		}

		.form-control:focus {
			border-color: var(--primary);
			box-shadow: 0 0 0 0.2rem rgba(34, 197, 94, 0.25);
		}

		.btn-custom {
			background-color: var(--primary);
			color: white;
			border: none;
			border-radius: 10px;
			padding: 0.75rem 1rem;
			font-weight: 600;
			width: 100%;
			transition: all 0.3s;
		}

		.btn-custom:hover {
			background-color: var(--primary-hover);
			transform: translateY(-2px);
			box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
			color: white;
		}

		.auth-link {
			color: var(--primary);
			text-decoration: none;
			font-weight: 600;
		}

		.auth-link:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>
	<nav class="navbar navbar-expand-lg fixed-top">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">ExpenseTracker</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
				<i class="fa-solid fa-bars text-dark"></i>
			</button>
			<div class="collapse navbar-collapse" id="navContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" href="/home">Home</a>
					</li>
				</ul>
				<div class="d-flex">
					<a class="nav-link text-primary fw-bold" href="login">Login</a>
				</div>
			</div>
		</div>
	</nav>

	<div class="container">
		<div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 150px);">
			<div class="col-md-6 col-lg-5">
				<div class="auth-card">
					<h1>Welcome Back</h1>

					<div th:if="${param.error}" class="alert alert-danger" style="border-radius: 10px;">
						Invalid username or password.
					</div>
					<div th:if="${param.logout}" class="alert alert-info" style="border-radius: 10px;">
						You have been logged out.
					</div>

					<form th:action="@{/login}" method="post">
						<div class="mb-4">
							<label for="username" class="form-label fw-bold">Email</label>
							<input type="email" class="form-control" id="username" name="username"
								placeholder="Enter Email ID" autofocus="autofocus" required>
						</div>
						<div class="mb-4">
							<label for="password" class="form-label fw-bold">Password</label>
							<input type="password" id="password" name="password" class="form-control"
								placeholder="Enter Password" required>
						</div>
						<div class="mb-4">
							<button type="submit" class="btn-custom">Log In</button>
						</div>
						<div class="text-center text-muted">
							New user? <a href="/registration" class="auth-link" th:href="@{/registration}">Register
								here</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		crossorigin="anonymous"></script>
</body>

</html>
