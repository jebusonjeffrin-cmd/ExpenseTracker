<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.com" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker - Edit Expense</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-color: #f4fcf4;
      --card-bg: #ffffff;
      --primary: #22c55e;
      --primary-hover: #16a34a;
      --text-dark: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --success-light: #dcfce7;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      margin: 0;
      padding-top: 80px;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 0.8rem 2rem;
    }

    .navbar-brand {
      font-weight: 800;
      color: var(--primary) !important;
      font-size: 1.5rem;
    }

    .nav-link {
      color: var(--text-muted) !important;
      font-weight: 600;
      transition: all 0.3s ease;
      margin: 0 0.5rem;
      border-radius: 8px;
      padding: 0.5rem 1rem !important;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--primary) !important;
      background: var(--success-light);
    }

    .logout-btn {
      background: #fee2e2;
      color: #ef4444;
      border: 1px solid #fecaca;
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      margin-left: 1rem;
    }

    .logout-btn:hover {
      background: #ef4444;
      color: white;
      text-decoration: none;
    }

    .main-container {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .card-custom {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      padding: 3rem;
    }

    .header-title {
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 2rem;
      text-align: center;
    }

    .form-control,
    .form-select {
      border-radius: 10px;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem rgba(34, 197, 94, 0.25);
    }

    .btn-custom {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-weight: 600;
      font-size: 1.1rem;
      width: 100%;
      transition: all 0.3s;
    }

    .btn-custom:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
      color: white;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">ExpenseTracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
        <i class="fa-solid fa-bars text-dark"></i>
      </button>
      <div class="collapse navbar-collapse" id="navContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/dashboard"
              onclick="return confirm('Are you sure you want to leave? Changes will be discarded.')"><i
                class="fa-solid fa-house me-2"></i>Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/available_expenses"
              onclick="return confirm('Are you sure you want to leave? Changes will be discarded.')"><i
                class="fa-solid fa-wallet me-2"></i>Expenses</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/new_expense"
              onclick="return confirm('Are you sure you want to leave? Changes will be discarded.')"><i
                class="fa-solid fa-plus-circle me-2"></i>Add Expense</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/getchart"
              onclick="return confirm('Are you sure you want to leave? Changes will be discarded.')"><i
                class="fa-solid fa-chart-pie me-2"></i>Report</a>
          </li>
        </ul>
        <div class="d-flex align-items-center">
          <span class="me-4 fw-bold text-dark" th:if="${message != null}">
            <i class="fa-solid fa-user-circle me-2 text-primary"></i> <span th:text="${message}">User</span>
          </span>
          <a th:href="@{/logout}" class="logout-btn"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="card-custom">
      <h2 class="header-title">Edit Expense</h2>

      <form id="expense-form" th:action="@{/available_expenses/editExpense/update/{id} (id=${expense.id})}"
        method="post">
        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <label for="amount" class="form-label fw-bold text-muted">Amount</label>
            <input type="number" id="amount" name="amount" step="0.01" class="form-control" th:value="${expense.amount}"
              required>
          </div>
          <div class="col-md-6">
            <label for="currency" class="form-label fw-bold text-muted">Currency</label>
            <select id="currency" name="currency" class="form-select" required>
              <option value="">Select a currency</option>
              <option value="USD" th:selected="${expense.currency == 'USD'}">USD ($)</option>
              <option value="INR" th:selected="${expense.currency == 'INR'}">INR (₹)</option>
              <option value="CAD" th:selected="${expense.currency == 'CAD'}">CAD ($)</option>
              <option value="YEN" th:selected="${expense.currency == 'YEN'}">YEN (¥)</option>
            </select>
          </div>
        </div>

        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <label for="date" class="form-label fw-bold text-muted">Date</label>
            <input type="date" id="date" name="date" class="form-control" th:value="${expense.date}" required>
          </div>
          <div class="col-md-6">
            <label for="category" class="form-label fw-bold text-muted">Category</label>
            <select id="category" name="category" class="form-select" required>
              <option value="">Select a category</option>
              <option value="food" th:selected="${expense.category == 'food'}">Food</option>
              <option value="transportation" th:selected="${expense.category == 'transportation'}">Transportation
              </option>
              <option value="housing" th:selected="${expense.category == 'housing'}">Housing</option>
              <option value="shopping" th:selected="${expense.category == 'shopping'}">Shopping</option>
              <option value="utilities" th:selected="${expense.category == 'utilities'}">Utilities</option>
              <option value="medical" th:selected="${expense.category == 'medical'}">Medical</option>
              <option value="entertainment" th:selected="${expense.category == 'entertainment'}">Entertainment</option>
              <option value="groceries" th:selected="${expense.category == 'groceries'}">Groceries</option>
            </select>
          </div>
        </div>

        <div class="mb-4">
          <label for="description" class="form-label fw-bold text-muted">Description</label>
          <textarea id="description" name="description" rows="3" class="form-control"
            th:text="${expense.description}"></textarea>
        </div>

        <div class="mt-5">
          <button type="submit" class="btn-custom"><i class="fa-solid fa-arrows-rotate me-2"></i>Update Expense</button>
        </div>
      </form>
    </div>
  </div>

  <!-- script to auto-populate the existing value of date -->
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var urlParams = new URLSearchParams(window.location.search);
      var dateString = urlParams.get('date');
      if (dateString) {
        var dateParts = dateString.split('/');
        var day = dateParts[0];
        var month = dateParts[1];
        var year = dateParts[2];
        var formattedDate = year + '-' + month + '-' + day;
        document.getElementById('date').value = formattedDate;
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>

</html>
