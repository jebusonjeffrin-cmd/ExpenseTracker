<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.com" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker - List</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-color: #f4fcf4;
      --card-bg: #ffffff;
      --primary: #22c55e;
      --primary-hover: #16a34a;
      --text-dark: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --success-light: #dcfce7;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      margin: 0;
      padding-top: 80px;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95) !important;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 0.8rem 2rem;
    }

    .navbar-brand {
      font-weight: 800;
      color: var(--primary) !important;
      font-size: 1.5rem;
    }

    .nav-link {
      color: var(--text-muted) !important;
      font-weight: 600;
      transition: all 0.3s ease;
      margin: 0 0.5rem;
      border-radius: 8px;
      padding: 0.5rem 1rem !important;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--primary) !important;
      background: var(--success-light);
    }

    .logout-btn {
      background: #fee2e2;
      color: #ef4444;
      border: 1px solid #fecaca;
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      margin-left: 1rem;
    }

    .logout-btn:hover {
      background: #ef4444;
      color: white;
      text-decoration: none;
    }

    .main-container {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card-custom {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      padding: 2rem;
    }

    .header-title {
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 1.5rem;
    }

    .table {
      vertical-align: middle;
    }

    .table thead th {
      background-color: var(--success-light);
      color: var(--primary-hover);
      border-bottom: 2px solid var(--border);
      font-weight: 600;
      padding: 1rem;
    }

    .table tbody td {
      padding: 1rem;
      color: var(--text-dark);
      border-bottom: 1px solid var(--border);
    }

    .table tbody tr:hover {
      background-color: #f9fafb;
    }

    .btn-filter {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.5rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-filter:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .form-select,
    .form-control {
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .form-select:focus,
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem rgba(34, 197, 94, 0.25);
    }

    .action-icon {
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .action-icon:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">ExpenseTracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
        <i class="fa-solid fa-bars text-dark"></i>
      </button>
      <div class="collapse navbar-collapse" id="navContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/dashboard"><i class="fa-solid fa-house me-2"></i>Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/available_expenses"><i class="fa-solid fa-wallet me-2"></i>Expenses</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/new_expense"><i class="fa-solid fa-plus-circle me-2"></i>Add Expense</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/getchart"><i class="fa-solid fa-chart-pie me-2"></i>Report</a>
          </li>
        </ul>
        <div class="d-flex align-items-center">
          <span class="me-4 fw-bold text-dark" th:if="${message != null}">
            <i class="fa-solid fa-user-circle me-2 text-primary"></i> <span th:text="${message}">User</span>
          </span>
          <a th:href="@{/logout}" class="logout-btn"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="card-custom">
      <h2 class="header-title">Your Expenses</h2>

      <form action="/entries" method="GET" class="row g-3 align-items-end mb-4">
        <div class="col-md-4">
          <label for="month" class="form-label fw-bold text-muted">Select Month</label>
          <select id="month" name="month" class="form-select">
            <option value="0" selected>All Months</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select>
        </div>
        <div class="col-md-4">
          <label for="year" class="form-label fw-bold text-muted">Enter Year</label>
          <input type="text" id="year" name="year" class="form-control" placeholder="YYYY">
        </div>
        <div class="col-md-4">
          <button type="submit" class="btn-filter w-100"><i class="fa-solid fa-filter me-2"></i>Apply Filter</button>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-hover" id="my_table">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Category</th>
              <th scope="col">Amount</th>
              <th scope="col">Currency</th>
              <th scope="col">Date</th>
              <th scope="col">Description</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="b :${expense}">
              <td th:text="${b.id}" class="text-muted fw-bold"></td>
              <td><span class="badge bg-success" th:text="${b.category}"></span></td>
              <td class="fw-bold fs-5" th:text="${b.amount}"></td>
              <td th:text="${b.currency}" class="text-muted"></td>
              <td th:text="${#dates.format(b.date, 'dd/MM/yyyy')}"></td>
              <td th:text="${b.description}"></td>
              <td>
                <a class="text-primary text-decoration-none me-3 action-icon"
                  th:href="@{/available_expenses/editExpense/{id}(id=${b.id}, date=${#dates.format(b.date, 'dd/MM/yyyy')})}"><i
                    class="fa-solid fa-pen-to-square"></i></a>
                <a class="text-danger text-decoration-none action-icon" th:href="@{/deleteExpense/{id}(id=${b.id})}"
                  onclick="return confirm('Are you sure you want to delete this record?')"><i
                    class="fa-solid fa-trash"></i></a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div th:if="${#lists.isEmpty(expense)}" class="text-center py-5 text-muted">
        <i class="fa-solid fa-folder-open fs-1 mb-3"></i>
        <h5>No expenses found for the selected criteria.</h5>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>

</html>
